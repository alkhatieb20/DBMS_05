name: CI Database Check

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Run Schema and Data
        run: |
          sqlite3 test.db < schema.sql
          sqlite3 test.db < data.sql

      - name: Verify Row Count
        run: |
          count=$(sqlite3 test.db "SELECT COUNT(*) FROM ausleihe;")
          echo "Total loans: $count"
          if [ "$count" -lt 1 ]; then
            echo "Error: Database is empty!"
            exit 1
          fi
